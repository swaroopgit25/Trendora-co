  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #f5f5f5;
    }
    .container {
      max-width: 100%;
      margin: 0 auto;
    }
    .controls {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 1000;
    }
    button {
      padding: 8px 16px;
      margin: 0 4px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #f0f0f0;
    }
    #svg-viewport {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      min-height: 80vh;
      position: relative;
    }
    #svg-container {
      cursor: grab;
      transform-origin: 0 0;
      padding: 20px;
    }
    #svg-container.dragging {
      cursor: grabbing;
    }
    #svg-container svg {
      display: block;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 20px;
      color: #333;
    }
    .hint {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }
    .watermark {
      position: fixed;
      bottom: 10px;
      right: 20px;
      font-size: 11px;
      color: #999;
      z-index: 1001;
    }
    .watermark a {
      color: #999;
      text-decoration: none;
    }
    .watermark a:hover {
      color: #666;
      text-decoration: underline;
    }
    /* Hover highlight styles */
    .node-group { cursor: pointer; }
    .node-group.dimmed rect { opacity: 0.3; }
    .node-group.dimmed text { opacity: 0.3; }
    .node-group.dimmed use { opacity: 0.3; }
    .node-group.highlighted rect { stroke-width: 4 !important; }
    .edge-path { transition: opacity 0.15s, stroke-width 0.15s, stroke 0.15s; }
    .edge-path.dimmed { opacity: 0.15; }
    .edge-path.highlighted-inbound { stroke-width: 5 !important; stroke: #0066cc !important; }
    .edge-path.highlighted-outbound { stroke-width: 5 !important; stroke: #cc6600 !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dependency Graph - Fiamma</h1>
    <p class="hint">💡 Hover over a project to highlight its dependencies. Use mouse wheel to zoom, drag to pan.</p>
    <div class="controls">
      <button onclick="zoomIn()">Zoom In</button>
      <button onclick="zoomOut()">Zoom Out</button>
      <button onclick="resetZoom()">Reset</button>
    </div>
    <div id="svg-viewport">
      <div id="svg-container">

<svg width="1189" height="860" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Incoming dependency icon -->
    <g id="icon-incoming" transform="scale(0.1)">
      <path d="M 100,35 L 100,10 L 170,10 L 170,110 L 100,110 L 100,85" fill="none" stroke="#0066cc" stroke-width="15"/>
      <path d="M 60,60 L 110,60" stroke="#0066cc" stroke-width="15" fill="none"/>
      <polygon points="110,40 140,60 110,80" fill="#0066cc"/>
    </g>
    <!-- Outgoing dependency icon -->
    <g id="icon-outgoing" transform="scale(0.1)">
      <path d="M 70,35 L 70,10 L 0,10 L 0,110 L 70,110 L 70,85" fill="none" stroke="#cc6600" stroke-width="15"/>
      <path d="M 40,60 L 100,60" stroke="#cc6600" stroke-width="15" fill="none"/>
      <polygon points="100,40 130,60 100,80" fill="#cc6600"/>
    </g>
    <!-- Arrow marker for edges (20x14, tip at origin) -->
    <marker id="arrowhead" markerWidth="20" markerHeight="14" refX="0" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#0080FF" />
    </marker>
    <!-- Arrow marker for NuGet edges -->
    <marker id="arrowhead-nuget" markerWidth="20" markerHeight="14" refX="0" refY="7" orient="auto" markerUnits="userSpaceOnUse">

  <script>
    // Pan and zoom state
    let scale = 1;
    let panX = 0;
    let panY = 0;
    let isDragging = false;
    let startX, startY;
    const container = document.getElementById('svg-container');
    const viewport = document.getElementById('svg-viewport');
    
    function updateTransform() {
      container.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    }
    
    // Mouse wheel zoom
    viewport.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = viewport.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      const newScale = Math.min(Math.max(scale * delta, 0.1), 5);
      
      // Zoom toward mouse position
      const scaleDiff = newScale - scale;
      panX -= (mouseX - panX) * (scaleDiff / scale);
      panY -= (mouseY - panY) * (scaleDiff / scale);
      scale = newScale;
      
      updateTransform();
    });
    
    // Pan with mouse drag
    container.addEventListener('mousedown', (e) => {
      if (e.target.closest('.node-group')) return; // Don't start drag on nodes
      isDragging = true;
      container.classList.add('dragging');
      startX = e.clientX - panX;
      startY = e.clientY - panY;
    });
    
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      panX = e.clientX - startX;
      panY = e.clientY - startY;
      updateTransform();
    });
    
    document.addEventListener('mouseup', () => {
      isDragging = false;
      container.classList.remove('dragging');
    });
    
    // Zoom buttons
    function zoomIn() {
      scale = Math.min(scale * 1.2, 5);
      updateTransform();
    }
    
    function zoomOut() {
      scale = Math.max(scale * 0.8, 0.1);
      updateTransform();
    }
    
    function resetZoom() {
      scale = 1;
      panX = 0;
      panY = 0;
      updateTransform();
    }
    
    // Hover highlighting
    const nodes = document.querySelectorAll('.node-group');
    const edges = document.querySelectorAll('.edge-path');
    
    // Store original marker-end for each edge
    edges.forEach(edge => {
      edge.dataset.originalMarker = edge.getAttribute('marker-end');
    });
    
    nodes.forEach(node => {
      const nodeId = node.getAttribute('data-node-id');
      
      node.addEventListener('mouseenter', () => {
        // Dim all nodes and edges
        nodes.forEach(n => n.classList.add('dimmed'));
        edges.forEach(e => e.classList.add('dimmed'));
        
        // Highlight this node
        node.classList.remove('dimmed');
        node.classList.add('highlighted');
        
        // Highlight connected edges and their nodes
        edges.forEach(edge => {
          const source = edge.getAttribute('data-source');
          const target = edge.getAttribute('data-target');
          
          if (source === nodeId || target === nodeId) {
            edge.classList.remove('dimmed');
            // Inbound = arrow points TO this node (this node is target)
            // Outbound = arrow points FROM this node (this node is source)
            if (target === nodeId) {
              edge.classList.add('highlighted-inbound');
              edge.setAttribute('marker-end', 'url(#arrowhead-inbound)');
            } else {
              edge.classList.add('highlighted-outbound');
              edge.setAttribute('marker-end', 'url(#arrowhead-outbound)');
            }
            
            // Also highlight the connected node
            const connectedId = source === nodeId ? target : source;
            const connectedNode = document.querySelector(`[data-node-id="${connectedId}"]`);
            if (connectedNode) {
              connectedNode.classList.remove('dimmed');
            }
          }
        });
      });
      
      node.addEventListener('mouseleave', () => {
        // Remove all highlighting
        nodes.forEach(n => {
          n.classList.remove('dimmed');
          n.classList.remove('highlighted');
        });
        edges.forEach(e => {
          e.classList.remove('dimmed');
          e.classList.remove('highlighted-inbound');
          e.classList.remove('highlighted-outbound');
          // Restore original marker
          e.setAttribute('marker-end', e.dataset.originalMarker);
        });
      });
    });
  </script>
